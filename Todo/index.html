<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUTS - Vexenn Unified Ticketing System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            vuts: {
              bg: '#0f172a',
              surface: '#1e293b',
              primary: '#22d3ee',
              accent: '#818cf8',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans selection:bg-cyan-500/30">
  <main class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-slate-800/50 border border-slate-700 rounded-3xl shadow-2xl backdrop-blur-md p-6">
      
      <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
          <span class="text-xs uppercase tracking-widest text-cyan-400 font-bold">Ticketing > Unified</span>
          <h1 class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent">VUTS Dashboard</h1>
        </div>
        <div class="bg-slate-900/80 p-2 rounded-xl border border-slate-700">
          <label class="text-[10px] block mb-1 text-slate-400 font-bold uppercase">Calendar View</label>
          <input type="date" id="calendarInput" class="bg-transparent text-sm outline-none cursor-pointer invert" />
        </div>
      </header>

      <form id="ticketForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-900/40 p-5 rounded-2xl border border-slate-700/50 mb-2">
        <div class="flex flex-col gap-1">
          <label class="text-xs text-slate-400 font-semibold">Ticket Subject</label>
          <input id="titleInput" type="text" class="bg-slate-800 border border-slate-700 p-2 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none transition-all placeholder:text-slate-600" placeholder="Describe the issue..." required />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs text-slate-400 font-semibold">Requestor</label>
          <input id="requestorInput" type="text" class="bg-slate-800 border border-slate-700 p-2 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none transition-all placeholder:text-slate-600" placeholder="Who reported this?" required />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs text-slate-400 font-semibold">Assignee</label>
          <input id="assigneeInput" type="text" class="bg-slate-800 border border-slate-700 p-2 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none transition-all placeholder:text-slate-600" placeholder="Responsible agent..." />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs text-slate-400 font-semibold">Priority</label>
          <div class="flex gap-2">
            <select id="priorityInput" class="flex-1 bg-slate-800 border border-slate-700 p-2 rounded-lg outline-none cursor-pointer">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
            <button type="submit" class="bg-gradient-to-br from-cyan-400 to-cyan-600 text-slate-900 font-black px-6 rounded-lg hover:scale-105 active:scale-95 transition-transform uppercase text-xs">Create</button>
          </div>
        </div>
      </form>
      <p id="formError" class="text-red-400 text-[10px] font-bold uppercase tracking-tight h-6 mb-4 px-2"></p>

      <section class="flex gap-2 mb-6">
        <button class="filter-btn is-active bg-cyan-500/20 text-cyan-400 border border-cyan-500/50 px-5 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all" data-filter="all">All</button>
        <button class="filter-btn text-slate-500 hover:text-white px-5 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all" data-filter="active">Active</button>
        <button class="filter-btn text-slate-500 hover:text-white px-5 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all" data-filter="completed">Resolved</button>
      </section>

      <ul id="ticketList" class="space-y-3 min-h-[100px]">
        </ul>

      <div id="emptyState" class="text-center py-16 border-2 border-dashed border-slate-700 rounded-3xl hidden">
        <p class="text-5xl mb-4 grayscale opacity-30">☕</p>
        <p class="text-slate-500 font-medium italic">Everything is handled. Time for a break.</p>
      </div>
    </div>
  </main>

  <div id="resolveModal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-slate-800 border border-slate-700 rounded-3xl p-8 max-w-md w-full shadow-2xl border-t-cyan-500/50 border-t-2">
      <h2 class="text-2xl font-black mb-2 text-white italic">RESOLVE TICKET</h2>
      <p class="text-slate-400 text-sm mb-6">Provide a final resolution comment. This will be archived in the system database.</p>
      <textarea id="resolveComment" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyan-500 mb-6 text-slate-100 placeholder:text-slate-700" rows="4" placeholder="Resolution details..."></textarea>
      <div class="flex gap-4">
        <button id="cancelResolve" class="flex-1 py-3 font-bold text-slate-500 hover:text-white transition-colors uppercase text-xs tracking-widest">Cancel</button>
        <button id="confirmResolve" class="flex-1 bg-cyan-500 text-slate-900 font-black py-3 rounded-xl hover:bg-cyan-400 transition-shadow hover:shadow-[0_0_20px_rgba(34,211,238,0.4)] uppercase text-xs tracking-widest">Confirm & Resolve</button>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-8 py-3 bg-gradient-to-r from-emerald-500 to-teal-600 text-slate-950 font-black rounded-full shadow-2xl opacity-0 pointer-events-none transition-all duration-300 uppercase text-xs tracking-widest"></div>

  <script src="script.js"></script>
</body>
</html>
