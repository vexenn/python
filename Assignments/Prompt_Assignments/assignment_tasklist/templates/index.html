<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Lab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="app-container">
        <h1>Task Master</h1>
        
        <div class="input-section">
            <input type="text" id="taskTitle" placeholder="Task Title (e.g. Finish Lab)">
            <input type="text" id="taskComment" placeholder="Add a comment or detail...">
            <button id="addBtn">Add Task</button>
        </div>

        <ul id="taskList">
            </ul>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
