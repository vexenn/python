<!DOCTYPE html>
<html>

<head>
    <title>BMI Calculator</title>   
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> 
</head>

<body>
    <div>
    <h1>BMI Calculator</h1> 
    <label for="weight">Weight (kg):</label>
    <input type="number" id="weight" name="weight" placeholder="Enter your weight in kg" required>
    <br><br>
    <label for="height">Height (m):</label>
    <input type="number" id="height" name="height" placeholder="Enter your height in meters" required>
    <br><br>
    <button id="calculateBtn">Calculate BMI</button>
    <div id="result"></div>
    </div>
</body>

</html>
