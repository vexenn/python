<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ guide.title }} | RVT Study Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <h2>VT MATH MASTER</h2>
            <ul>
                <li><a href="/?section=dashboard" style="color: white; text-decoration: none;">🏠 Back to Dashboard</a></li>
                <li><a href="/?section=solver" style="color: white; text-decoration: none;">🧮 Open Solver</a></li>
            </ul>
        </nav>

        <main class="content">
            <a href="/?section=dashboard" style="text-decoration: none; color: var(--primary-blue); font-weight: 600;">← Back to Roadmap</a>
            
            <div class="card" style="margin-top: 20px;">
                <span class="week-tag">Study Guide</span>
                <h1 style="margin-top: 10px;">{{ guide.title }}</h1>
                
                <p style="font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; margin-bottom: 25px;">{{ guide.content }}</p>
                
                <div class="calculation-output" style="margin: 30px 0;">
                    <h3 style="color: var(--primary-blue);">🧠 The Logic Breakdown</h3>
                    <div style="background: white; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.1rem; border: 1px solid #e2e8f0; white-space: pre-wrap;">{{ guide.breakdown }}</div>
                </div>

                <div class="card" style="background: #fffbe6; border: 1px solid #f1c40f; border-left-width: 5px; box-shadow: none;">
                    <h3 style="color: #856404; margin-top: 0;">✍️ Practice Problem</h3>
                    <p style="font-size: 1.1rem; font-style: italic; margin-bottom: 20px;">{{ guide.example_problem }}</p>
                    
                    <button onclick="toggleAnswer()" id="ans-btn" style="background: #f1c40f; color: #856404; box-shadow: 0 4px 0 #b58900;">
                        Show Step-by-Step Solution
                    </button>
                    
                    <div id="guide-answer" class="hidden" style="margin-top: 25px; padding: 20px; background: white; border-radius: 8px; border: 1px dashed #f1c40f;">
                        <strong style="color: #856404;">Detailed Solution:</strong>
                        <p style="margin-top: 10px; line-height: 1.6; white-space: pre-wrap; font-family: 'Inter', sans-serif;">{{ guide.example_solution }}</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        /**
         * Simple toggle logic for the study guide answer.
         * Toggles the 'hidden' class and updates button text.
         */
        function toggleAnswer() {
            const ans = document.getElementById('guide-answer');
            const btn = document.getElementById('ans-btn');
            if (ans.classList.contains('hidden')) {
                ans.classList.remove('hidden');
                btn.innerText = "Hide Solution";
            } else {
                ans.classList.add('hidden');
                btn.innerText = "Show Step-by-Step Solution";
            }
        }
    </script>
</body>
</html>
