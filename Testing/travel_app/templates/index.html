<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Itinerary Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header>
        <h1>Wanderlust AI Planner</h1>
        <p>Your personalized travel concierge.</p>
    </header>

    <main>
        <section class="form-section">
            <form id="travel-form">
                <div class="form-group">
                    <label for="destination">Where are you going?</label>
                    <input type="text" id="destination" placeholder="e.g., Taipei, Taiwan" required>
                </div>
                <div class="form-group">
                    <label for="duration">Duration:</label>
                    <input type="text" id="duration" placeholder="e.g., 3 days" required>
                </div>
                <div class="form-group">
                    <label for="preferences">Preferences (budget, pace, food):</label>
                    <input type="text" id="preferences" placeholder="e.g., foodie, low budget, relaxed pace">
                </div>
                <button type="submit" id="submit-btn">Generate Itinerary</button>
            </form>
            <div id="loading" class="hidden">Consulting the AI... Please wait.</div>
        </section>

        <section id="itinerary-container" class="hidden">
            <div class="actions">
                <button id="export-btn">Export to PDF</button>
            </div>
            <div id="itinerary-content"></div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
